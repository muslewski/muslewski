<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="420" viewBox="0 0 1500 420">
  <defs>
    <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15233B"/>
      <stop offset="0.42" stop-color="#3A4A63"/>
      <stop offset="0.66" stop-color="#8A6A66"/>
      <stop offset="0.84" stop-color="#C8823F"/>
      <stop offset="1" stop-color="#EBB85C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.86" r="0.5">
      <stop offset="0" stop-color="#F6DC92" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#F0B450" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#F0B450" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F2D27E"/>
      <stop offset="1" stop-color="#F2D27E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="420" fill="url(#dawn)"/>
  <ellipse cx="1085" cy="360" rx="520" ry="280" fill="url(#glow)"/>

  <g fill="#EFE7D8">
    <circle cx="220" cy="56" r="1.4" opacity="0.5"/>
    <circle cx="430" cy="40" r="1.1" opacity="0.4"/>
    <circle cx="640" cy="66" r="1.2" opacity="0.35"/>
  </g>

  <!-- rising sun, partly behind the ridge -->
  <circle cx="1085" cy="306" r="92" fill="#F7E2A0"/>
  <circle cx="1085" cy="306" r="92" fill="none" stroke="#F9ECC4" stroke-width="2" opacity="0.6"/>

  <!-- single clean ridgeline silhouette -->
  <path d="M0,330 L210,300 L420,332 L640,296 L860,330 L1085,290 L1300,330 L1500,304 L1500,420 L0,420 Z"
        fill="#14180E"/>
  <path d="M0,374 L260,352 L520,378 L780,348 L1040,380 L1300,352 L1500,372 L1500,420 L0,420 Z"
        fill="#0C0E08"/>

  <text x="92" y="120" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="7" fill="#F2D27E">MATEUSZ</text>
  <text x="88" y="222" font-family="Oswald, sans-serif" font-weight="700" font-size="116" letter-spacing="2" fill="#F4ECDD">MUŚLEWSKI</text>
  <rect x="92" y="248" width="360" height="2.5" fill="url(#rule)"/>
  <text x="92" y="292" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="2" fill="#EAD9B0">dev tools · watch the fleet · forecast the limit</text>
</svg>
